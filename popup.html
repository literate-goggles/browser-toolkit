<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeetFocus</title>
  <link rel="stylesheet" href="css/popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>LeetFocus</h1>
    </header>
    
    <main>
      <div class="toggle-container">
        <label for="difficulty-toggle" class="toggle-label">
          <div class="toggle-info">
            <img id="state-icon" src="icons/on.png" alt="Status Icon" class="toggle-icon">
            <span class="toggle-text">Hide Problem Difficulty</span>
          </div>
          <div class="toggle-switch">
            <input type="checkbox" id="difficulty-toggle" checked>
            <span class="slider"></span>
          </div>
        </label>
      </div>
    </main>
    
    <footer>
      <p>Focus on the problem, not the difficulty</p>
    </footer>
  </div>
  
  <script src="js/popup.js"></script>
</body>
</html>
